# Builds the Vite app and deploys static output to GitHub Pages.
# Enable in repo Settings → Pages → Source: GitHub Actions.
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install and build
        env:
          # Project site: https://<owner>.github.io/<repo>/
          BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build
          if grep -q 'src/main.tsx' out/index.html; then
            echo "Build did not transform index.html (dev entry still present). Check the build log."
            exit 1
          fi
          cp out/index.html out/404.html
          touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
